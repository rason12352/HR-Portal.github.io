<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<title>Banner 輪播</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: sans-serif; background: #f4f4f4; }

  /* Banner 外層容器 */
  .banner-container {
    position: relative;
    width: 100%;
    max-width: 1200px;
    height: 400px;
    margin: 0 auto;
    overflow: hidden;
  }

  /* 放所有 slide 的跑道，會整條左右移動 */
  .banner-slides {
    display: flex;
    width: 100%;
    height: 100%;
    transition: transform 0.6s ease;
  }

  /* 每一張 slide */
  .banner-slide {
    min-width: 100%;
    height: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
    color: white;
    font-size: 32px;
    font-weight: bold;
  }
  .banner-slide img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
  }

  /* 下方白色點點 */
  .banner-dots {
    position: absolute;
    bottom: 18px;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    gap: 10px;
    z-index: 2;
  }
  .banner-dot {
    width: 12px;
    height: 12px;
    border-radius: 50%;
    background: rgba(255, 255, 255, 0.5);
    border: 1px solid rgba(255, 255, 255, 0.8);
    cursor: pointer;
    transition: all 0.3s;
  }
  .banner-dot:hover {
    background: #fff;
    transform: scale(1.3);
  }
  .banner-dot.active {
    background: #fff;
  }
</style>
</head>
<body>

<div class="banner-container">
  <div class="banner-slides" id="slides">
    <!-- 每一塊就是一個 banner，把 src 換成你的圖就好 -->
    <div class="banner-slide" style="background: linear-gradient(135deg, #667eea, #764ba2);">
      Banner 1 — 把這裡換成 &lt;img src="你的圖1.jpg"&gt;
    </div>
    <div class="banner-slide" style="background: linear-gradient(135deg, #f093fb, #f5576c);">
      Banner 2
    </div>
    <div class="banner-slide" style="background: linear-gradient(135deg, #4facfe, #00f2fe);">
      Banner 3
    </div>
    <div class="banner-slide" style="background: linear-gradient(135deg, #43e97b, #38f9d7);">
      Banner 4
    </div>
  </div>

  <div class="banner-dots" id="dots"></div>
</div>

<script>
  const slides = document.getElementById('slides');
  const dotsContainer = document.getElementById('dots');
  const total = slides.children.length;
  let current = 0;
  let autoTimer = null;

  // 建立下方的小圓點
  for (let i = 0; i < total; i++) {
    const dot = document.createElement('div');
    dot.className = 'banner-dot' + (i === 0 ? ' active' : '');

    // 滑鼠滑上去就切換（你要的效果）
    dot.addEventListener('mouseenter', () => {
      goTo(i);
      restartAuto();
    });

    // 順便也支援點擊
    dot.addEventListener('click', () => {
      goTo(i);
      restartAuto();
    });

    dotsContainer.appendChild(dot);
  }

  function goTo(index) {
    current = index;
    slides.style.transform = `translateX(-${index * 100}%)`;
    document.querySelectorAll('.banner-dot').forEach((d, i) => {
      d.classList.toggle('active', i === index);
    });
  }

  // 自動輪播（不想要的話可以整段刪掉）
  function startAuto() {
    autoTimer = setInterval(() => {
      goTo((current + 1) % total);
    }, 4000);
  }
  function restartAuto() {
    clearInterval(autoTimer);
    startAuto();
  }
  startAuto();
</script>

</body>
</html>
